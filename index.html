<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>perpex</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #f9f8f5;
      --text: #28251d;
      --text-muted: #7a7974;
      --accent: #01696f;
      --border: rgba(40,37,29,0.1);
      --radius: 0.75rem;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171614;
        --surface: #1c1b19;
        --text: #cdccca;
        --text-muted: #797876;
        --accent: #4f98a3;
        --border: rgba(255,255,255,0.08);
      }
    }

    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    main {
      display: grid;
      place-items: center;
      min-height: 100dvh;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 3rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    h1 span { color: var(--accent); }

    p {
      color: var(--text-muted);
      font-size: 0.9375rem;
      margin-bottom: 2rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.375rem 1rem;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 2rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .links a {
      display: block;
      padding: 0.625rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 150ms, border-color 150ms;
    }

    .links a:hover {
      background: var(--bg);
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <div class="card">
      <h1>per<span>pex</span></h1>
      <p>Buildless. Browser-native. Ready.</p>
      <div class="status">
        <span class="dot"></span>
        <span>live</span>
      </div>
      <div class="links">
        <a href="./html-editor.html">✏️ HTML Editor</a>
        <a href="./liquid_glass_vibrancy.html">🪟 Liquid Glass Vibrancy</a>
      </div>
    </div>
  </main>
</body>
</html>
