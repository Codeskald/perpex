<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibrancy DNA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --blur-radius: 0px;
      --white-opacity: 1;
    }

    html, body {
      background-color: transparent !important;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
    }

    #shutter {
      position: fixed;
      inset: 0;
      background-color: rgba(255, 255, 255, var(--white-opacity));
      backdrop-filter: blur(var(--blur-radius));
      -webkit-backdrop-filter: blur(var(--blur-radius));
      -moz-appearance: -moz-mac-vibrancy-light;
      transition: background-color 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                  backdrop-filter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .ui-card {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.05);
      padding: 3rem;
      border-radius: 2.5rem;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.03);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-primary {
      background: #000;
      color: #fff;
      width: 100%;
      padding: 1.25rem;
      border-radius: 1.25rem;
      font-weight: 500;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }

    .btn-primary:hover { background: #333; }

    .btn-revert {
      width: 100%;
      padding: 0.75rem;
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: color 0.3s ease;
      background: none;
      border: none;
      cursor: pointer;
    }

    .btn-revert:hover { color: #1e293b; }

    body.bleed-active #shutter {
      -moz-appearance: -moz-mac-vibrancy-dark;
      background-color: rgba(0, 0, 0, 0.4);
    }

    body.bleed-active .ui-card {
      background: rgba(15, 15, 20, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-color: rgba(255, 255, 255, 0.15);
      color: white;
      box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    body.bleed-active .btn-primary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
    }

    body.bleed-active .btn-primary:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body class="bg-transparent">
  <div id="shutter">
    <div class="ui-card" id="card">
      <h1 class="text-3xl font-light mb-4 tracking-tight" id="status">Solid State</h1>
      <p class="text-slate-400 text-sm mb-12 leading-relaxed" id="desc">
        The window is currently opaque white.
      </p>
      <div class="space-y-4">
        <button onclick="engageBleed()" class="btn-primary" id="mainBtn">Engage Liquid Glass</button>
        <button onclick="revert()" class="btn-revert">Revert to Opaque</button>
      </div>
      <div class="mt-16 border-t border-slate-100 dark:border-white/10 pt-6">
        <button onclick="downloadSelf()" class="text-[9px] text-slate-400 hover:text-indigo-500 uppercase tracking-[0.2em] transition-colors w-full bg-transparent border-none cursor-pointer">
          Extract Local DNA
        </button>
      </div>
    </div>
  </div>

  <script>
    const root = document.documentElement;
    const status = document.getElementById('status');
    const desc = document.getElementById('desc');
    const body = document.body;

    function engageBleed() {
      root.style.setProperty('--white-opacity', '0.05');
      root.style.setProperty('--blur-radius', '30px');
      body.classList.add('bleed-active');
      status.innerText = 'Liquid Glass Active';
      status.style.color = '#fff';
      desc.innerText = 'The compositor is now revealing the underlying OS layer through a dark glassy lens.';
      desc.style.color = '#cbd5e1';
    }

    function revert() {
      root.style.setProperty('--white-opacity', '1');
      root.style.setProperty('--blur-radius', '0px');
      body.classList.remove('bleed-active');
      status.innerText = 'Solid State';
      status.style.color = 'inherit';
      desc.innerText = 'The window is currently opaque white.';
      desc.style.color = '#94a3b8';
    }

    function downloadSelf() {
      const htmlContent = document.documentElement.outerHTML;
      const blob = new Blob(['<!doctype html>\n' + htmlContent], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'liquid_glassy_vibrancy.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
