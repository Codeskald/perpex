<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pretty</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b0a2e 50%, #0a1a1a 100%);
    }
    .card {
      width: clamp(300px, 85vw, 440px);
      padding: 2.5rem;
      border-radius: 1.25rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(var(--blur, 14px));
      -webkit-backdrop-filter: blur(var(--blur, 14px));
      transition: backdrop-filter 500ms ease, -webkit-backdrop-filter 500ms ease;
      color: #e8e6e0;
    }
    h1 { font-size: 1.75rem; font-weight: 300; margin-bottom: 0.75rem; letter-spacing: -0.02em; }
    p  { font-size: 0.875rem; color: rgba(255,255,255,0.5); line-height: 1.7; margin-bottom: 2rem; }
    .btn {
      padding: 0.65rem 1.5rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #e8e6e0;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .btn:hover { background: rgba(255,255,255,0.18); }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .readout { margin-top: 1.25rem; font-size: 0.7rem; color: rgba(255,255,255,0.3); font-family: monospace; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>Glass card ✦</h1>
    <p>Click the button to increase the blur behind this panel.</p>
    <button class="btn" id="btn" onclick="step()">Blur more</button>
    <div class="readout" id="readout">blur: 14px</div>
  </div>
  <script>
    let b = 14;
    const card = document.getElementById('card');
    const btn  = document.getElementById('btn');
    const out  = document.getElementById('readout');
    function step() {
      b = Math.min(b + 12, 80);
      card.style.setProperty('--blur', b + 'px');
      out.textContent = 'blur: ' + b + 'px';
      if (b >= 80) { btn.textContent = 'maxed out'; btn.disabled = true; }
    }
  </script>
</body>
</html>
